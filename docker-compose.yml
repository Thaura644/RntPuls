services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rentpulse
      POSTGRES_USER: rentpulse
      POSTGRES_PASSWORD: rentpulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rentpulse -d rentpulse"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://rentpulse:rentpulse@db:5432/rentpulse?sslmode=disable
      JWT_SECRET: change-this-before-production
      FRONTEND_ORIGIN: http://localhost:5173
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_SMS: ${TWILIO_FROM_SMS:-}
      TWILIO_FROM_WHATSAPP: ${TWILIO_FROM_WHATSAPP:-}
      MPESA_BASE_URL: ${MPESA_BASE_URL:-https://sandbox.safaricom.co.ke}
      MPESA_CONSUMER_KEY: ${MPESA_CONSUMER_KEY:-}
      MPESA_CONSUMER_SECRET: ${MPESA_CONSUMER_SECRET:-}
      MPESA_SHORT_CODE: ${MPESA_SHORT_CODE:-}
      UPLOAD_DIR: /app/uploads
      PUBLIC_BASE_URL: http://localhost:8080
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080/api
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
  uploads:
