name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rentpulse
          POSTGRES_USER: rentpulse
          POSTGRES_PASSWORD: rentpulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rentpulse -d rentpulse"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: true
      - run: go mod download
      - run: go test ./...
        env:
          DATABASE_URL: postgres://rentpulse:rentpulse@localhost:5432/rentpulse?sslmode=disable
          JWT_SECRET: ci-secret

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
